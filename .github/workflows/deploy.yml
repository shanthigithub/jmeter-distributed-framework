name: Deploy JMeter ECS Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Deploy infrastructure (CDK)'
        required: false
        default: 'true'
      build_image:
        description: 'Build and push Docker image'
        required: false
        default: 'true'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PREFIX: jmeter-framework

jobs:
  # STEP 1: Deploy infrastructure FIRST (CDK creates ECR repo, ECS cluster, all AWS resources)
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || github.event.inputs.deploy_infra == 'true'
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      account_id: ${{ steps.account.outputs.id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iac/package-lock.json
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account: $ACCOUNT_ID"
      
      - name: Install dependencies
        run: |
          cd iac
          npm ci
      
      - name: CDK Bootstrap (First-time setup)
        run: |
          cd iac
          echo "🔧 Bootstrapping CDK environment..."
          npx cdk bootstrap
          echo "✅ CDK Bootstrap complete"
      
      - name: CDK Synth
        run: |
          cd iac
          npx cdk synth
      
      - name: CDK Deploy
        env:
          IMAGE_TAG: latest
        run: |
          cd iac
          echo "Deploying infrastructure..."
          echo "CDK will create:"
          echo "  - ECR repository: ${ECR_REPOSITORY_PREFIX}-${{ steps.account.outputs.id }}"
          echo "  - ECS cluster: jmeter-ecs-cluster-${{ steps.account.outputs.id }}"
          echo "  - Lambda functions, S3 buckets, Step Functions, etc."
          npx cdk deploy --all --require-approval never
      
      - name: Get Stack Outputs
        id: outputs
        run: |
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ConfigBucketName`].OutputValue' \
            --output text)
          
          RESULTS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ResultsBucketName`].OutputValue' \
            --output text)
          
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          echo "config_bucket=$CONFIG_BUCKET" >> $GITHUB_OUTPUT
          echo "results_bucket=$RESULTS_BUCKET" >> $GITHUB_OUTPUT
          echo "state_machine=$STATE_MACHINE" >> $GITHUB_OUTPUT
      
      - name: Infrastructure Summary
        env:
          CONFIG_BUCKET: ${{ steps.outputs.outputs.config_bucket }}
          RESULTS_BUCKET: ${{ steps.outputs.outputs.results_bucket }}
          STATE_MACHINE: ${{ steps.outputs.outputs.state_machine }}
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          echo "✅ Infrastructure deployment complete!"
          echo ""
          echo "📦 Resources Created by CDK:"
          echo "  - ECR Repository: ${ECR_REPOSITORY_PREFIX}-${ACCOUNT_ID}"
          echo "  - ECS Cluster: jmeter-ecs-cluster-${ACCOUNT_ID}"
          echo "  - Config Bucket: $CONFIG_BUCKET"
          echo "  - Results Bucket: $RESULTS_BUCKET"
          echo "  - State Machine: $STATE_MACHINE"
          echo ""
          echo "➡️  Next: Build & push Docker image to the ECR created by CDK"

  # STEP 2: Build and push Docker image to ECR (which was created by CDK in Step 1)
  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    # Build if: manual trigger OR any push to main
    # AND infrastructure deployment was successful
    if: |
      always() &&
      (github.event.inputs.build_image == 'true' || github.event_name == 'push') &&
      needs.deploy-infrastructure.result == 'success'
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/Dockerfile', 'docker/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Verify ECR repository exists (created by CDK)
        env:
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_PREFIX }}-${{ needs.deploy-infrastructure.outputs.account_id }}
        run: |
          echo "Verifying ECR repository created by CDK..."
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY
          echo "✅ ECR repository confirmed: $ECR_REPOSITORY"
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_PREFIX }}-${{ needs.deploy-infrastructure.outputs.account_id }}
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ needs.deploy-infrastructure.outputs.account_id }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ needs.deploy-infrastructure.outputs.account_id }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            JMETER_VERSION=5.6.3
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      
      - name: Build summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_PREFIX }}-${{ needs.deploy-infrastructure.outputs.account_id }}
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo ""
          echo "📦 Image Details:"
          echo "  - Repository: $ECR_REPOSITORY (created by CDK)"
          echo "  - Tags:"
          echo "    • $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "    • $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo ""
          echo "⚡ Docker layer caching enabled for faster future builds"
          echo "🚀 JMeter framework is now ready to run tests!"